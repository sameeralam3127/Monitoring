global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093

  - job_name: node_exporter
    static_configs:
      - targets:
          - linux_system_1:9100
          - linux_system_2:9100
          - linux_system_3:9100
          - linux_system_4:9100
          - linux_system_5:9100
          - linux_system_6:9100
          - linux_system_7:9100
          - linux_system_8:9100
          - linux_system_9:9100
          - linux_system_10:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: blackbox-exporter
    static_configs:
      - targets:
          - blackbox-exporter:9115

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:9464

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - http://grafana:3000/login
          - http://prometheus:9090/-/healthy
          - http://cadvisor:8080/healthz
          - http://alertmanager:9093/-/healthy
          - http://loki:3100/ready
          - http://python-observability-demo:8000/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
