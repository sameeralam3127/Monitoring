groups:
  - name: infrastructure-alerts
    rules:
      - alert: TargetDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Target {{ $labels.instance }} is down"
          description: "Prometheus has not been able to scrape {{ $labels.job }} on {{ $labels.instance }} for more than 1 minute."

      - alert: HostHighCPU
        expr: 100 * (1 - avg by (instance) (rate(node_cpu_seconds_total{job="node_exporter",mode="idle"}[5m]))) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage has been above 80% for 5 minutes."

      - alert: HostHighMemory
        expr: 100 * ((node_memory_MemTotal_bytes{job="node_exporter"} - node_memory_MemAvailable_bytes{job="node_exporter"}) / node_memory_MemTotal_bytes{job="node_exporter"}) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage has been above 85% for 5 minutes."

      - alert: ContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total{name!="",image!=""}[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} CPU usage is high"
          description: "The container has been consuming more than 0.8 CPU cores for 5 minutes."

      - alert: ContainerHighMemory
        expr: container_memory_usage_bytes{name!="",image!=""} > 536870912
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} memory usage is high"
          description: "The container is using more than 512 MiB of memory."

      - alert: SyntheticProbeFailed
        expr: probe_success{job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Synthetic check failed for {{ $labels.instance }}"
          description: "The blackbox probe failed for 2 minutes."
