x-node-exporter: &node-exporter
  build: .
  tty: true
  restart: unless-stopped
  networks:
    - monitoring

services:
  linux_system_1:
    <<: *node-exporter
    container_name: linux_system_1
    ports:
      - "9101:9100"

  linux_system_2:
    <<: *node-exporter
    container_name: linux_system_2
    ports:
      - "9102:9100"

  linux_system_3:
    <<: *node-exporter
    container_name: linux_system_3
    ports:
      - "9103:9100"

  linux_system_4:
    <<: *node-exporter
    container_name: linux_system_4
    ports:
      - "9104:9100"

  linux_system_5:
    <<: *node-exporter
    container_name: linux_system_5
    ports:
      - "9105:9100"

  linux_system_6:
    <<: *node-exporter
    container_name: linux_system_6
    ports:
      - "9106:9100"

  linux_system_7:
    <<: *node-exporter
    container_name: linux_system_7
    ports:
      - "9107:9100"

  linux_system_8:
    <<: *node-exporter
    container_name: linux_system_8
    ports:
      - "9108:9100"

  linux_system_9:
    <<: *node-exporter
    container_name: linux_system_9
    ports:
      - "9109:9100"

  linux_system_10:
    <<: *node-exporter
    container_name: linux_system_10
    ports:
      - "9110:9100"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - monitoring

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    restart: unless-stopped
    ports:
      - "9115:9115"
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    networks:
      - monitoring

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    networks:
      - monitoring

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command:
      - -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring

  tempo:
    image: grafana/tempo:2.6.0
    container_name: tempo
    user: "0"
    restart: unless-stopped
    command:
      - -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"
    networks:
      - monitoring

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      - cadvisor
      - alertmanager
      - blackbox-exporter
      - otel-collector
    networks:
      - monitoring

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.1
    container_name: otel-collector
    restart: unless-stopped
    command:
      - --config=/etc/otelcol-contrib/config.yml
    volumes:
      - ./otel-collector/config.yml:/etc/otelcol-contrib/config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"
    depends_on:
      - tempo
    networks:
      - monitoring

  python-observability-demo:
    build:
      context: ./python-app
    container_name: python-observability-demo
    restart: unless-stopped
    environment:
      OTEL_SERVICE_NAME: python-observability-demo
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      DEPLOYMENT_ENVIRONMENT: local
    ports:
      - "8000:8000"
    depends_on:
      - otel-collector
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - monitoring

volumes:
  grafana_data:
  prometheus_data:
  loki_data:
  tempo_data:

networks:
  monitoring:
    driver: bridge
